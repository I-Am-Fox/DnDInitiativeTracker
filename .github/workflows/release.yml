permissions:
  contents: write

name: Build and Release

on:
  workflow_dispatch:
    inputs:
      run-tests:
        description: 'Run tests'
        required: false
        type: boolean

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9 (for Velopack CLI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup .NET 8 (for application build)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract Version from csproj
        id: extract_version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content ./DnDInitiativeTracker/DnDInitiativeTracker.csproj
          $version = $csproj.Project.PropertyGroup.Version
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore "./DnDInitiativeTracker.sln"

      - name: Publish application
        run: |
          dotnet publish "./DnDInitiativeTracker/DnDInitiativeTracker.csproj" -c Release -o publish -r win-x64 --self-contained false

      - name: Create Velopack Release
        shell: pwsh
        run: |
          dotnet tool install -g vpk
          vpk download github --repoUrl https://github.com/I-Am-Fox/DnDInitiativeTracker --token ${{ secrets.GITHUB_TOKEN }} --channel win
          vpk pack -u DnDInitiativeTracker -v ${{ steps.extract_version.outputs.version }} -p publish -e DnDInitiativeTracker.exe --channel win
          vpk upload github --repoUrl https://github.com/I-Am-Fox/DnDInitiativeTracker --publish --releaseName "DnDInitiativeTracker v${{ steps.extract_version.outputs.version }}" --tag v${{ steps.extract_version.outputs.version }} --token ${{ secrets.GITHUB_TOKEN }} --channel win
